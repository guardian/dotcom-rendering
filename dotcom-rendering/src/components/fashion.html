<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>THE EDIT — Guardian Fashion</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,500&family=Archivo:wght@300;400;500;600&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--blue: #052962;
				--ink: #0d0d0d;
				--ivory: #f7f4ef;
				--paper: #fcfaf6;
				--accent: #c8472f;
				/* refined vermilion */
				--gold: #b8924a;
				--mist: #cfc9be;
				--line: rgba(13, 13, 13, 0.14);
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			html {
				scroll-behavior: smooth;
			}

			body {
				background: var(--paper);
				color: var(--ink);
				font-family: 'Archivo', sans-serif;
				font-weight: 400;
				overflow-x: hidden;
				-webkit-font-smoothing: antialiased;
			}

			::selection {
				background: var(--accent);
				color: #fff;
			}

			.serif {
				font-family: 'Fraunces', serif;
			}

			img {
				display: block;
			}

			.ph {
				opacity: 0;
				transform: scale(1.04);
				transition:
					opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1),
					transform 1.4s cubic-bezier(0.16, 1, 0.3, 1);
			}

			.ph.loaded {
				opacity: 1;
				transform: scale(1);
			}

			/* progress */
			.progress {
				position: fixed;
				top: 0;
				left: 0;
				height: 3px;
				background: var(--accent);
				width: 0;
				z-index: 300;
				transition: width 0.1s linear;
			}

			/* ===== INTRO — full-viewport overlapping collage ===== */
			.intro {
				height: 100vh;
				min-height: 660px;
				position: relative;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
				background: var(--ink);
			}

			.intro-photos {
				position: absolute;
				inset: 0;
			}

			.ip {
				position: absolute;
				overflow: hidden;
				will-change: transform;
				box-shadow: 0 40px 80px rgba(0, 0, 0, 0.35);
				opacity: 0;
				animation: ipIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
			}

			.ip img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

			@keyframes ipIn {
				from {
					opacity: 0;
					transform: translateY(40px) scale(0.98);
				}

				to {
					opacity: 1;
				}
			}

			/* large overlapping panels that tile the viewport edge-to-edge */
			.ip1 {
				width: 30vw;
				height: 64vh;
				left: -2vw;
				top: -4vh;
				z-index: 1;
				animation-delay: 0.05s;
			}

			.ip2 {
				width: 26vw;
				height: 52vh;
				left: 24vw;
				top: 10vh;
				z-index: 2;
				animation-delay: 0.18s;
			}

			.ip3 {
				width: 30vw;
				height: 60vh;
				right: -3vw;
				top: -6vh;
				z-index: 1;
				animation-delay: 0.12s;
			}

			.ip4 {
				width: 28vw;
				height: 58vh;
				left: -3vw;
				bottom: -6vh;
				z-index: 2;
				animation-delay: 0.26s;
			}

			.ip5 {
				width: 25vw;
				height: 50vh;
				left: 38vw;
				bottom: -8vh;
				z-index: 1;
				animation-delay: 0.34s;
			}

			.ip6 {
				width: 30vw;
				height: 62vh;
				right: -2vw;
				bottom: -5vh;
				z-index: 2;
				animation-delay: 0.22s;
			}

			/* central legibility scrim */
			.intro-scrim {
				position: absolute;
				inset: 0;
				z-index: 4;
				background: radial-gradient(
					ellipse 46% 52% at 50% 50%,
					rgba(13, 13, 13, 0.62) 0%,
					rgba(13, 13, 13, 0.3) 55%,
					rgba(13, 13, 13, 0) 100%
				);
			}

			.intro-center {
				position: relative;
				z-index: 5;
				text-align: center;
			}

			.intro .kicker {
				font-size: 12px;
				letter-spacing: 0.42em;
				text-transform: uppercase;
				font-weight: 500;
				color: var(--accent);
				margin-bottom: 26px;
				opacity: 0;
				animation: fade 1.2s 0.5s forwards;
			}

			.intro h1 {
				font-family: 'Fraunces', serif;
				font-weight: 300;
				font-size: clamp(72px, 15vw, 224px);
				line-height: 0.84;
				letter-spacing: -0.02em;
				color: var(--ivory);
				text-shadow: 0 2px 40px rgba(0, 0, 0, 0.5);
			}

			.intro h1 .ed {
				font-style: italic;
				font-weight: 400;
				display: block;
				color: #fff;
			}

			.intro .meta {
				margin-top: 30px;
				font-family: 'Fraunces', serif;
				font-style: italic;
				font-weight: 400;
				font-size: clamp(15px, 2vw, 22px);
				color: #d8d4cc;
				opacity: 0;
				animation: fade 1.2s 1s forwards;
				text-shadow: 0 1px 20px rgba(0, 0, 0, 0.5);
			}

			.scrollhint {
				position: absolute;
				bottom: 32px;
				left: 50%;
				transform: translateX(-50%);
				z-index: 6;
				font-size: 10px;
				letter-spacing: 0.34em;
				text-transform: uppercase;
				font-weight: 500;
				color: var(--ivory);
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 12px;
				opacity: 0;
				animation: fade 1.2s 1.4s forwards;
			}

			.scrollhint .ln {
				width: 1px;
				height: 46px;
				background: rgba(247, 244, 239, 0.4);
				position: relative;
				overflow: hidden;
			}

			.scrollhint .ln::after {
				content: '';
				position: absolute;
				top: -46px;
				left: 0;
				width: 1px;
				height: 46px;
				background: var(--accent);
				animation: drop 1.8s infinite;
			}

			@keyframes drop {
				to {
					top: 46px;
				}
			}

			@keyframes fade {
				to {
					opacity: 1;
				}
			}

			@media (max-width: 820px) {
				.ip1 {
					width: 52vw;
					height: 40vh;
					left: -4vw;
					top: -2vh;
				}

				.ip2 {
					width: 46vw;
					height: 34vh;
					right: -4vw;
					top: 6vh;
					left: auto;
				}

				.ip3 {
					width: 50vw;
					height: 38vh;
					left: -3vw;
					top: 34vh;
				}

				.ip4 {
					width: 48vw;
					height: 36vh;
					right: -4vw;
					top: 42vh;
					left: auto;
					bottom: auto;
				}

				.ip5 {
					width: 50vw;
					height: 36vh;
					left: 2vw;
					bottom: -4vh;
				}

				.ip6 {
					width: 46vw;
					height: 34vh;
					right: -4vw;
					bottom: -2vh;
				}
			}

			/* ===== thin marquee ===== */
			.strip {
				border-top: 1px solid var(--line);
				border-bottom: 1px solid var(--line);
				overflow: hidden;
				white-space: nowrap;
				padding: 18px 0;
				background: var(--paper);
			}

			.strip-track {
				display: inline-flex;
				gap: 40px;
				animation: mq 38s linear infinite;
			}

			.strip-track span {
				font-family: 'Fraunces', serif;
				font-weight: 300;
				font-style: italic;
				font-size: clamp(18px, 2.4vw, 30px);
				color: var(--ink);
				display: inline-flex;
				gap: 40px;
				align-items: center;
			}

			.strip-track span::after {
				content: '—';
				color: var(--accent);
				font-style: normal;
			}

			@keyframes mq {
				to {
					transform: translateX(-50%);
				}
			}

			/* ===== horizontal rail ===== */
			.rail-outer {
				position: relative;
			}

			.rail-sticky {
				position: sticky;
				top: 0;
				height: 100vh;
				display: flex;
				align-items: center;
				overflow: hidden;
			}

			.rail-track {
				display: flex;
				align-items: center;
				gap: 4vw;
				padding: 0 8vw;
				will-change: transform;
			}

			.rail-head {
				flex: 0 0 auto;
				width: 40vw;
				min-width: 300px;
			}

			.rail-head .eyebrow {
				font-size: 11px;
				letter-spacing: 0.3em;
				text-transform: uppercase;
				font-weight: 500;
				color: var(--accent);
				margin-bottom: 24px;
			}

			.rail-head h2 {
				font-family: 'Fraunces', serif;
				font-weight: 300;
				font-size: clamp(40px, 5.5vw, 92px);
				line-height: 0.96;
				letter-spacing: -0.02em;
			}

			.rail-head h2 em {
				font-style: italic;
				color: var(--blue);
			}

			.rail-head p {
				margin-top: 26px;
				font-size: 15px;
				line-height: 1.6;
				max-width: 360px;
				color: #555;
				font-weight: 300;
			}

			.look {
				flex: 0 0 auto;
				width: 30vw;
				min-width: 280px;
			}

			.look-img {
				width: 100%;
				aspect-ratio: 3/4;
				overflow: hidden;
				border-radius: 2px;
				position: relative;
				background: var(--mist);
			}

			.look-img img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				transition: transform 1.1s cubic-bezier(0.16, 1, 0.3, 1);
			}

			.look:hover .look-img img {
				transform: scale(1.05);
			}

			.look-no {
				position: absolute;
				top: 16px;
				left: 16px;
				font-family: 'Fraunces', serif;
				font-style: italic;
				font-size: 15px;
				color: #fff;
				text-shadow: 0 1px 8px rgba(0, 0, 0, 0.4);
			}

			.look-meta {
				display: flex;
				justify-content: space-between;
				align-items: baseline;
				margin-top: 18px;
				border-top: 1px solid var(--line);
				padding-top: 14px;
			}

			.look-meta h3 {
				font-family: 'Fraunces', serif;
				font-weight: 400;
				font-size: 19px;
			}

			.look-meta .price {
				font-size: 14px;
				color: var(--accent);
				font-weight: 500;
				letter-spacing: 0.02em;
			}

			.look-meta2 {
				font-size: 12.5px;
				color: #888;
				margin-top: 6px;
				font-weight: 300;
			}

			/* ===== editorial split ===== */
			.split {
				display: grid;
				grid-template-columns: 1fr 1fr;
				min-height: 100vh;
			}

			.split-img {
				overflow: hidden;
				position: relative;
			}

			.split-img img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

			.split-txt {
				display: flex;
				flex-direction: column;
				justify-content: center;
				padding: 8vw 6vw;
				background: var(--ink);
				color: var(--ivory);
			}

			.split-txt .eyebrow {
				font-size: 11px;
				letter-spacing: 0.3em;
				text-transform: uppercase;
				color: var(--accent);
				font-weight: 500;
				margin-bottom: 28px;
			}

			.split-txt h2 {
				font-family: 'Fraunces', serif;
				font-weight: 300;
				font-size: clamp(32px, 4vw, 64px);
				line-height: 1.04;
				letter-spacing: -0.01em;
			}

			.split-txt h2 em {
				font-style: italic;
				color: var(--gold);
			}

			.split-txt p {
				margin-top: 26px;
				font-size: 16px;
				line-height: 1.7;
				color: #bdbab3;
				font-weight: 300;
				max-width: 460px;
			}

			.split-txt .sig {
				margin-top: 34px;
				font-family: 'Fraunces', serif;
				font-style: italic;
				font-size: 16px;
				color: var(--ivory);
			}

			/* ===== parallax quote ===== */
			.quote {
				min-height: 120vh;
				position: relative;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
				background: var(--blue);
				color: var(--ivory);
				text-align: center;
			}

			.quote .qimg {
				position: absolute;
				overflow: hidden;
				border-radius: 2px;
				opacity: 0.85;
				will-change: transform;
				box-shadow: 0 30px 70px rgba(0, 0, 0, 0.4);
			}

			.quote .qimg img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

			.q1 {
				width: 18vw;
				min-width: 140px;
				height: 24vw;
				min-height: 190px;
				left: 8%;
				top: 18%;
			}

			.q2 {
				width: 15vw;
				min-width: 120px;
				height: 20vw;
				min-height: 160px;
				right: 9%;
				bottom: 16%;
			}

			.quote .qtext {
				position: relative;
				z-index: 3;
				max-width: 980px;
				padding: 0 28px;
			}

			.quote .qtext p {
				font-family: 'Fraunces', serif;
				font-weight: 300;
				font-size: clamp(28px, 4.4vw, 68px);
				line-height: 1.12;
				letter-spacing: -0.015em;
			}

			.quote .qtext em {
				font-style: italic;
				color: var(--gold);
			}

			/* ===== gallery ===== */
			.gallery {
				padding: 16vh 6vw;
			}

			.gallery .gh {
				display: flex;
				align-items: flex-end;
				justify-content: space-between;
				margin-bottom: 64px;
				gap: 24px;
				flex-wrap: wrap;
			}

			.gallery .gh h2 {
				font-family: 'Fraunces', serif;
				font-weight: 300;
				font-size: clamp(40px, 6vw, 108px);
				line-height: 0.9;
				letter-spacing: -0.02em;
			}

			.gallery .gh h2 em {
				font-style: italic;
				color: var(--accent);
			}

			.gallery .gh p {
				font-size: 14px;
				color: #777;
				max-width: 280px;
				font-weight: 300;
				line-height: 1.6;
			}

			.grid {
				display: grid;
				grid-template-columns: repeat(12, 1fr);
				gap: 16px;
				grid-auto-rows: 14vw;
			}

			.tile {
				overflow: hidden;
				border-radius: 2px;
				position: relative;
				opacity: 0;
				transform: translateY(60px);
				transition:
					opacity 1s cubic-bezier(0.16, 1, 0.3, 1),
					transform 1s cubic-bezier(0.16, 1, 0.3, 1);
				background: var(--mist);
			}

			.tile.in {
				opacity: 1;
				transform: none;
			}

			.tile img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
			}

			.tile:hover img {
				transform: scale(1.06);
			}

			.tile .cap {
				position: absolute;
				left: 0;
				bottom: 0;
				right: 0;
				padding: 18px;
				background: linear-gradient(transparent, rgba(0, 0, 0, 0.6));
				color: #fff;
				font-family: 'Fraunces', serif;
				font-style: italic;
				font-size: 16px;
				opacity: 0;
				transition: opacity 0.4s;
			}

			.tile:hover .cap {
				opacity: 1;
			}

			.t-a {
				grid-column: span 5;
				grid-row: span 2;
			}

			.t-b {
				grid-column: span 4;
				grid-row: span 2;
			}

			.t-c {
				grid-column: span 3;
				grid-row: span 2;
			}

			.t-d {
				grid-column: span 4;
				grid-row: span 2;
			}

			.t-e {
				grid-column: span 5;
				grid-row: span 2;
			}

			.t-f {
				grid-column: span 3;
				grid-row: span 2;
			}

			/* ===== outro ===== */
			.outro {
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				text-align: center;
				padding: 10vh 24px;
				position: relative;
				overflow: hidden;
				background: var(--ink);
				color: var(--ivory);
			}

			.outro .obg {
				position: absolute;
				inset: 0;
				opacity: 0.22;
			}

			.outro .obg img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

			.outro .ovl {
				position: absolute;
				inset: 0;
				background: radial-gradient(
					ellipse at center,
					rgba(13, 13, 13, 0.55),
					rgba(13, 13, 13, 0.9)
				);
			}

			.outro .inner {
				position: relative;
				z-index: 3;
				max-width: 720px;
			}

			.outro .eyebrow {
				font-size: 11px;
				letter-spacing: 0.34em;
				text-transform: uppercase;
				color: var(--accent);
				font-weight: 500;
				margin-bottom: 26px;
			}

			.outro h2 {
				font-family: 'Fraunces', serif;
				font-weight: 300;
				font-size: clamp(44px, 8vw, 128px);
				line-height: 0.9;
				letter-spacing: -0.02em;
			}

			.outro h2 em {
				font-style: italic;
				color: var(--gold);
			}

			.outro p {
				font-family: 'Fraunces', serif;
				font-style: italic;
				font-weight: 300;
				font-size: clamp(16px, 2.2vw, 24px);
				margin-top: 24px;
				color: #cbc8c1;
			}

			.outro .form {
				margin-top: 42px;
				display: flex;
				border-bottom: 1px solid rgba(247, 244, 239, 0.4);
				max-width: 440px;
				width: 100%;
				margin-left: auto;
				margin-right: auto;
			}

			.outro .form input {
				flex: 1;
				background: transparent;
				border: 0;
				padding: 16px 4px;
				color: var(--ivory);
				font-family: 'Archivo';
				font-size: 15px;
				outline: none;
			}

			.outro .form input::placeholder {
				color: #888;
			}

			.outro .form button {
				background: transparent;
				color: var(--ivory);
				border: 0;
				padding: 0 8px;
				font-family: 'Fraunces', serif;
				font-style: italic;
				font-size: 16px;
				cursor: pointer;
				transition: color 0.3s;
			}

			.outro .form button:hover {
				color: var(--gold);
			}

			.outro .ok {
				font-family: 'Fraunces', serif;
				font-style: italic;
				font-size: 22px;
				margin-top: 40px;
				color: var(--gold);
			}

			.outro .credit {
				position: absolute;
				bottom: 22px;
				z-index: 3;
				font-size: 10px;
				letter-spacing: 0.26em;
				text-transform: uppercase;
				color: #888;
				font-weight: 500;
			}

			@media (max-width: 820px) {
				.rail-head {
					width: 78vw;
				}

				.look {
					width: 68vw;
				}

				.split {
					grid-template-columns: 1fr;
				}

				.split-img {
					height: 60vh;
				}

				.grid {
					grid-template-columns: repeat(2, 1fr);
					grid-auto-rows: 42vw;
				}

				.t-a,
				.t-b,
				.t-c,
				.t-d,
				.t-e,
				.t-f {
					grid-column: span 1;
					grid-row: span 1;
				}
			}

			@media (prefers-reduced-motion: reduce) {
				* {
					animation-duration: 0.001s !important;
				}

				.ph,
				.tile {
					opacity: 1 !important;
					transform: none !important;
				}

				.intro .kicker,
				.intro .meta,
				.scrollhint {
					opacity: 1 !important;
				}

				.rail-sticky {
					position: relative;
					height: auto;
					display: block;
					padding: 10vh 0;
				}

				.rail-track {
					flex-wrap: wrap;
					transform: none !important;
					gap: 30px;
				}

				.quote {
					min-height: auto;
					padding: 16vh 0;
				}
			}
		</style>
	</head>

	<body>
		<div id="root"></div>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

		<script type="text/babel" data-presets="react">

				m_red: 'https://images.unsplash.com/photo-1580478491436-fd6a937acc9e?auto=format&fit=crop&w=900&h=1200&q=80',
				m_reddress:

				m_scarf:

				m_sun: 'https://images.unsplash.com/photo-1538329972958-465d6d2144ed?auto=format&fit=crop&w=900&h=1200&q=80',
				m_gray: 'https://images.unsplash.com/photo-1574015974293-817f0ebebb74?auto=format&fit=crop&w=900&h=1200&q=80',

				man_bw: 'https://images.unsplash.com/photo-1475403614135-5f1aa0eb5015?auto=format&fit=crop&w=900&h=1200&q=80',
				man_suit:
					'https://images.unsplash.com/photo-1480429370139-e0132c086e2a?auto=format&fit=crop&w=900&h=1200&q=80',
				man_blazer:
					'https://images.unsplash.com/photo-1453396450673-3fe83d2db2c4?auto=format&fit=crop&w=900&h=1200&q=80',
				man_window:
					'https://images.unsplash.com/photo-1625698457101-fec2f565a8f0?auto=format&fit=crop&w=900&h=1200&q=80',
			};

			/* graceful image with fade-in + fallback */
			function Img({ src, alt, className = '' }) {
				const [err, setErr] = useState(false);
				return (
					<img
						className={'ph ' + className}
						src={src}
						alt={alt || ''}
						onLoad={(e) => e.target.classList.add('loaded')}
						onError={(e) => {
							if (!err) {
								e.target.style.background =
									'linear-gradient(135deg,#CFC9BE,#a9a294)';
								e.target.classList.add('loaded');
								setErr(true);
							}
						}}
					/>
				);
			}

			/* Resolve the element that actually scrolls. Standalone: document/window.
		   Embedded in a React app: often a nested overflow:auto wrapper. We probe
		   upward from #root and return {target, getY, getMax, getH}. Cached. */
			let _scrollSrc = null;
			function scrollSource() {
				if (_scrollSrc) return _scrollSrc;
				const root = document.getElementById('root');
				let el = root ? root.parentElement : null;
				let found = null;
				while (
					el &&
					el !== document.body &&
					el !== document.documentElement
				) {
					const s = getComputedStyle(el);
					if (
						(s.overflowY === 'auto' ||
							s.overflowY === 'scroll' ||
							s.overflowY === 'overlay') &&
						el.scrollHeight > el.clientHeight
					) {
						found = el;
						break;
					}
					el = el.parentElement;
				}
				_scrollSrc = found
					? {
							target: found,
							getY: () => found.scrollTop,
							getMax: () =>
								found.scrollHeight - found.clientHeight,
							getH: () => found.clientHeight,
						}
					: {
							target: window,
							getY: () =>
								window.scrollY ||
								document.documentElement.scrollTop ||
								0,
							getMax: () =>
								document.documentElement.scrollHeight -
								window.innerHeight,
							getH: () => window.innerHeight,
						};
				return _scrollSrc;
			}

			function useScroll() {
				const [y, setY] = useState(0);
				useEffect(() => {
					const src = scrollSource();
					let raf = 0;
					const on = () => {
						if (raf) return;
						raf = requestAnimationFrame(() => {
							setY(src.getY());
							raf = 0;
						});
					};
					src.target.addEventListener('scroll', on, {
						passive: true,
					});
					on();
					return () => src.target.removeEventListener('scroll', on);
				}, []);
				return y;
			}
			function Progress() {
				const [w, setW] = useState(0);
				useEffect(() => {
					const src = scrollSource();
					const on = () => {
						const h = src.getMax();
						setW(h > 0 ? (src.getY() / h) * 100 : 0);
					};
					src.target.addEventListener('scroll', on, {
						passive: true,
					});
					on();
					return () => src.target.removeEventListener('scroll', on);
				}, []);
				return <div className="progress" style={{ width: w + '%' }} />;
			}
			function useReveal() {
				const ref = useRef(null);
				useEffect(() => {
					const el = ref.current;
					if (!el) return;
					const io = new IntersectionObserver(
						(es) =>
							es.forEach((e) => {
								if (e.isIntersecting) {
									e.target.classList.add('in');
									io.unobserve(e.target);
								}
							}),
						{ threshold: 0.15 },
					);
					io.observe(el);
					return () => io.disconnect();
				}, []);
				return ref;
			}

			/* INTRO */
			function Intro() {

								}}

								<Img
									src={PHOTOS.man_bw}

							</div>
							<div
								className="ip ip3"
								style={{
									transform: `translateY(${-y * 0.09}px)`,
								}}
							>
								<Img
									src={PHOTOS.m_yellow}
									alt="Model in yellow"

							</div>
							<div
								className="ip ip4"
								style={{
									transform: `translateY(${-y * 0.16}px)`,
								}}
							>
								<Img
									src={PHOTOS.man_suit}
									alt="Male model in pinstripe suit"
								/>
							</div>
							<div
								className="ip ip5"
								style={{
									transform: `translateY(${-y * 0.11}px)`,

								<Img

								/>
							</div>
							<div
								className="ip ip6"
								style={{
									transform: `translateY(${-y * 0.18}px)`,

							</div>
						</div>
						<div className="intro-scrim"></div>
						<div

							style={{
								transform: `translateY(${y * 0.18}px)`,

							}}

							<div className="kicker">Guardian Fashion</div>
							<h1>
								The<span className="ed">Edit</span>
							</h1>

			function Strip() {
				const t =
					'The considered wardrobe — Oxblood as neutral — The drop shoulder returns — Heritage wool — Buy once, keep forever ';
				return (

			/* RAIL */
			const LOOKS = [
				{
					img: 'm_coat',
					no: 'Look 01',
					name: 'The Camel Coat',
					price: '£420',
					note: 'Wool-cashmere, dropped shoulder',
				},
				{
					img: 'm_reddress',
					no: 'Look 02',
					name: 'Oxblood Slip',
					price: '£185',
					note: 'Bias-cut silk',
				},
				{
					img: 'm_jacket',
					no: 'Look 03',
					name: 'Leather, Softened',
					price: '£540',
					note: 'Vegetable-tanned',
				},
				{
					img: 'man_blazer',
					no: 'Look 04',
					name: 'The Grey Blazer',
					price: '£380',
					note: 'Menswear, unstructured',
				},
				{
					img: 'm_dress2',
					no: 'Look 05',
					name: 'The Column',
					price: '£260',
					note: 'Floor-length, marigold',
				},
				{
					img: 'man_suit',
					no: 'Look 06',
					name: 'Pinstripe, Relaxed',
					price: '£495',
					note: 'Wool, soft shoulder',
				},
				{
					img: 'm_glasses',
					no: 'Look 07',
					name: 'Cobalt Tailoring',
					price: '£310',
					note: 'Relaxed two-piece',
				},
			];
			function Rail() {
				const outer = useRef(null);
				const [tx, setTx] = useState(0);
				useEffect(() => {
					const el = outer.current;
					if (!el) return;
					const src = scrollSource();
					const on = () => {
						const rect = el.getBoundingClientRect(); // viewport-relative
						const viewH = src.getH();
						const total = el.offsetHeight - viewH;
						if (total <= 0) {
							setTx(0);
							return;
						}
						// top edge of the scroll viewport in the same coordinate space as rect.top
						const viewTop =
							src.target === window
								? 0
								: src.target.getBoundingClientRect().top;
						const prog = Math.min(
							Math.max((viewTop - rect.top) / total, 0),
							1,
						);
						const track = el.querySelector('.rail-track');
						const viewW =
							src.target === window
								? window.innerWidth
								: src.target.clientWidth;
						const dist = Math.max(track.scrollWidth - viewW, 0);
						setTx(-prog * dist);
					};
					src.target.addEventListener('scroll', on, {
						passive: true,
					});
					window.addEventListener('resize', on);
					on();
					return () => {
						src.target.removeEventListener('scroll', on);
						window.removeEventListener('resize', on);
					};
				}, []);
				return (
					<div
						className="rail-outer"
						ref={outer}
						style={{ height: '340vh' }}
					>
						<div className="rail-sticky">
							<div
								className="rail-track"
								style={{ transform: `translateX(${tx}px)` }}
							>
								<div className="rail-head">

										Five looks,
										<br />

									</h2>
									<p>
										No churn, no filler — only the pieces
										our editors would actually invest in.
										Scroll to move through the rail.
									</p>
								</div>
								{LOOKS.map((l, i) => (
									<div className="look" key={i}>
										<div className="look-img">
											<span className="look-no">
												{l.no}
											</span>
											<Img
												src={PHOTOS[l.img]}
												alt={l.name}
											/>
										</div>
										<div className="look-meta">
											<h3>{l.name}</h3>
											<span className="price">
												{l.price}
											</span>
										</div>
										<div className="look-meta2">
											{l.note}
										</div>
									</div>
								))}
							</div>
						</div>
					</div>
				);
			}

			/* SPLIT editorial */
			function Split() {
				return (
					<section className="split">
						<div className="split-img">
							<Img src={PHOTOS.m_gray} alt="Editorial portrait" />
						</div>
						<div className="split-txt">
							<div className="eyebrow">The Cover Story</div>
							<h2>
								The most radical thing a designer can do now is{' '}
								<em>restraint</em>.
							</h2>
							<p>
								After seasons of noise, the quiet garment is the
								bold one. We spent three months inside the
								studios where the next decade of dressing is
								being decided — and found designers competing,
								almost paradoxically, to disappear into the
								wardrobe of someone genuinely interesting.
							</p>
							<div className="sig">
								— Imogen Hartley, Fashion Editor
							</div>
						</div>
					</section>
				);
			}

			/* PARALLAX QUOTE */
			function Quote() {
				const ref = useRef(null);
				const [l, setL] = useState(0);
				useEffect(() => {
					const src = scrollSource();
					const on = () => {
						const el = ref.current;
						if (!el) return;
						const r = el.getBoundingClientRect();
						setL(src.getH() - r.top);
					};
					src.target.addEventListener('scroll', on, {
						passive: true,
					});
					on();
					return () => src.target.removeEventListener('scroll', on);
				}, []);
				return (
					<section className="quote" ref={ref}>
						<div
							className="qimg q1"
							style={{ transform: `translateY(${l * 0.1}px)` }}
						>
							<Img src={PHOTOS.m_sand} alt="" />
						</div>
						<div
							className="qimg q2"
							style={{ transform: `translateY(${-l * 0.08}px)` }}
						>
							<Img src={PHOTOS.m_flower} alt="" />
						</div>
						<div className="qtext">
							<p>
								Fashion isn't frivolous. It's how a culture
								tells you, in <em>cloth</em>, exactly what it
								believes.
							</p>
						</div>

				);
			}

			/* GALLERY */
			const TILES = [
				{ img: 'm_coat', cap: 'The coat, reconsidered', cls: 't-a' },
				{ img: 'm_reddress', cap: 'Oxblood', cls: 't-b' },
				{ img: 'm_sun', cap: 'Eyewear / 01', cls: 't-c' },
				{ img: 'm_yellow', cap: 'Marigold', cls: 't-d' },
				{ img: 'm_face', cap: 'The quiet portrait', cls: 't-e' },
				{ img: 'man_window', cap: 'Menswear, in light', cls: 't-f' },

			function Tile({ t }) {
				const ref = useReveal();
				return (
					<div ref={ref} className={'tile ' + t.cls}>
						<Img src={PHOTOS[t.img]} alt={t.cap} />
						<div className="cap">{t.cap}</div>

				);
			}
			function Gallery() {
				return (
					<section className="gallery">
						<div className="gh">
							<h2>
								The whole <em>edit</em>
							</h2>
							<p>
								Eighteen pieces, one point of view. Photographed
								for The Guardian, Spring 2026.
							</p>
						</div>
						<div className="grid">
							{TILES.map((t, i) => (
								<Tile key={i} t={t} />
							))}
						</div>
					</section>
				);
			}

			/* OUTRO */
			function Outro() {
				const [email, setEmail] = useState('');
				const [sent, setSent] = useState(false);
				return (
					<section className="outro">
						<div className="obg">
							<Img src={PHOTOS.hero} alt="" />
						</div>
						<div className="ovl"></div>
						<div className="inner">
							<div className="eyebrow">
								Free weekly newsletter
							</div>
							<h2>
								Get the <em>Edit</em>
							</h2>
							<p>
								The week in fashion, decoded — every Thursday.
								No spam, no selling your data.
							</p>
							{!sent ? (
								<div className="form">
									<input
										type="email"
										placeholder="your@email.com"
										value={email}
										onChange={(e) =>
											setEmail(e.target.value)
										}
										onKeyDown={(e) => {
											if (
												e.key === 'Enter' &&
												email.includes('@')
											)
												setSent(true);
										}}
									/>
									<button
										onClick={() => {
											if (email.includes('@'))
												setSent(true);
										}}
									>
										Subscribe →
									</button>
								</div>
							) : (
								<div className="ok">
									You're in. See you Thursday.
								</div>
							)}
						</div>
						<div className="credit">
							The Guardian · Fashion · A concept
						</div>
					</section>
				);
			}

			function App() {
				return (
					<>
						<Progress />
						<Intro />
						<Strip />
						<Rail />
						<Split />
						<Quote />
						<Gallery />
						<Outro />
					</>
				);
			}
			ReactDOM.createRoot(document.getElementById('root')).render(
				<App />,
			);
		</script>
	</body>
